# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.

# Main Page Setup

title: "Alexandre Panhaleux's Portfolio" # This is what shows up in the tab of the browser



# Hero Section
name: Alexandre Panhaleux
headline: Embedded Systems & Firmware Engineer
description: >- # dont remove this line. this will ignore all new lines until the next section
  I am an electrical engineer focused on embedded systems, from hardware and electronics design 
  to firmware development and validation. I enjoy designing robust system architectures, bringing
  hardware to life with clean embedded software, and verifying performance with a practical, test-
  driven approach. This portfolio showcases selected projects and the engineering decisions behind them.

# Place your profile image in /assets/images/profile-image/folder and edit the file name
profile_image: ./assets/images/profile-image/avatar.jpg


# Link your resume
# You can place your resume in assets/resume/{resume.pdf or add external link such as pdf saved in google drive 
resume-url: ./assets/resume/resume.pdf# or /assets/resume/resume.pdf


# Set up external links - this will show up as small icons next to your name.

external-links:    # input only your own url slug. The icons with missing entries will not appear.
  linkedin: alexandre-panhaleux-6750a01b9/    # https://www.linkedin.com/in/{your url slug} 
  github: alexandrephl    # https://github.com/{your url slug} 
  

# Skills Section - Add the list of your Skills by categories/tools. The indentation for each level needs to be precise. 
skills:
  - category: "Development"
    tools:
      - "C/C++"
      - "Python"
      - "Bash"
      - "MATLAB"

  - category: "API"
    tools:
      - "Git"
      - "NI VeriStand"
      - "Simulink"
      - "Code Composer Studio"
      - "STM32CubeIDE"
      - "Visual Studio Code"
      - "Visual Studio"
      - "GitHub"
      - "Arduino / Raspberry Pi"
      - "Breadboarding for circuit testing"

  - category: "Embedded systems"
    tools:
      - "TM4C"
      - "STM32"
      - "ESP32"
      - "Raspberry Pi"
      - "BSP conception"
      - "Low-level drivers (CAN, UART, I2C...)"
      - "RTOS (CMSIS, FreeRTOS)"

  - category: "Electronics/Hardware"
    tools:
      - "PCB Design (Altium Designer, KiCad)"
      - "Breadboarding for circuit testing"
      - "Logic analyser / Oscilloscope"
      - "Analog electronics"
      - "Circuit design"

  - category: "Avionics"
    tools:
      - "DO-178C"
      - "ARINC 429"
      - "RS-485"
      - "AFHA"

# Contact Form Setup. Setup an account and copy over the key. When someone fills out the form, it will be received in your email.
formspree-key: ""

# Active theme (Updatethis to switch themes). Make sure to keep the indentation the samne.
colors: 
  text: "#2c3333"
  border: "#e0f2ef"
  link: "#40b3a2"
  highlight: "#2a9d8f"
  background: "#f7fbfa"
  light_background: "#f0f9f7"




#########################################################################################################
# Build settings for the site. Editing the below may cause the site to malfunction.

collections:
  projects:
    output: true
    permalink: /projects/:path/


markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1
      indent: 0

plugins:
  - jekyll-feed

include:
  - _projects


